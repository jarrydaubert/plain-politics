name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repo-health:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Lockfile policy guard
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f bun.lock ]; then
            echo "::error::Missing bun.lock. Commit the Bun lockfile."
            exit 1
          fi

          for f in package-lock.json yarn.lock pnpm-lock.yaml bun.lockb; do
            if [ -f "$f" ]; then
              echo "::error::Disallowed lockfile present: $f"
              exit 1
            fi
          done

      - name: Tracked env guard
        shell: bash
        run: |
          set -euo pipefail
          bad_env_files="$(git ls-files | awk '
            /(^|\/)\.env($|\.)/ && $0 !~ /(^|\/)\.env(\..*)?\.example$/ { print }
          ')"

          if [ -n "$bad_env_files" ]; then
            echo "::error::Do not commit live env files. Move secrets to provider env vars:"
            echo "$bad_env_files"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Repo checks
        run: bun run check:repo

      - name: Build
        run: bun run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: plain-politics-playwright-chromium-v1

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run deterministic E2E checks
        run: bun run test:e2e:ci

      - name: Upload Playwright blob report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report
          path: blob-report
          retention-days: 7

  e2e-live:
    name: E2E live sources (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: plain-politics-playwright-chromium-v1

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run live-source E2E smoke
        run: bun run test:e2e:live:ci

      - name: Upload Playwright blob report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-blob-report
          path: blob-report
          retention-days: 7
